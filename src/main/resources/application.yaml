spring:
  application:
    name: restapis
  datasource:
    url: jdbc:postgresql://localhost:55432/game_store
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET}

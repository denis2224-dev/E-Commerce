spring:
  application:
    name: restapis
  datasource:
    url: jdbc:postgresql://localhost:55432/game_store
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080

security:
  jwt:
    secret: "dev-only-change-this-secret-key-which-is-at-least-32-chars"

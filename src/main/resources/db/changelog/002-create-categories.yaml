databaseChangeLog:
  - changeSet:
      id: 002-create-categories
      author: Denis
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: categories
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: SMALLINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_categories
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)

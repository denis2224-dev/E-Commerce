databaseChangeLog:
  - changeSet:
      id: 008-create-cart-items
      author: Denis
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: cart_items
      changes:
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_cart_items
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_items_user
                    references: users(id)
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_items_product
                    references: products(id)
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: cart_items
            columnNames: user_id, product_id
            constraintName: uk_cart_items_user_product
        - createIndex:
            tableName: cart_items
            indexName: idx_cart_items_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: cart_items
            indexName: idx_cart_items_product_id
            columns:
              - column:
                  name: product_id

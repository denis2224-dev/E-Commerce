databaseChangeLog:
  - changeSet:
      id: 003-create-products
      author: Denis
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: products
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_products
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: price
                  type: NUMERIC(38, 2)
              - column:
                  name: image_url
                  type: VARCHAR(255)
              - column:
                  name: category_id
                  type: SMALLINT
                  constraints:
                    foreignKeyName: fk_products_category
                    references: categories(id)
        - createIndex:
            tableName: products
            indexName: idx_products_category_id
            columns:
              - column:
                  name: category_id

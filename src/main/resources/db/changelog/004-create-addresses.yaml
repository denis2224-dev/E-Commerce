databaseChangeLog:
  - changeSet:
      id: 004-create-addresses
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: addresses
      changes:
        - createTable:
            tableName: addresses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_addresses
                    nullable: false
              - column:
                  name: street
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(255)
              - column:
                  name: zip
                  type: VARCHAR(255)
              - column:
                  name: state
                  type: VARCHAR(255)
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_addresses_user
                    references: users(id)
        - createIndex:
            tableName: addresses
            indexName: idx_addresses_user_id
            columns:
              - column:
                  name: user_id

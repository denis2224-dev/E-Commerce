databaseChangeLog:
  - changeSet:
      id: 005-create-profiles
      author: Denis
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: profiles
      changes:
        - createTable:
            tableName: profiles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_profiles
                    nullable: false
                    foreignKeyName: fk_profiles_user
                    references: users(id)
              - column:
                  name: bio
                  type: VARCHAR(255)
              - column:
                  name: phone_number
                  type: VARCHAR(255)
              - column:
                  name: date_of_birth
                  type: DATE
              - column:
                  name: loyalty_points
                  type: INTEGER

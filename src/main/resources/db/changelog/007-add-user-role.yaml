databaseChangeLog:
  - changeSet:
      id: 007-add-user-role
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: users
              columnName: role
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: role
                  type: VARCHAR(50)
                  defaultValue: USER
                  constraints:
                    nullable: false
        - update:
            tableName: users
            columns:
              - column:
                  name: role
                  value: USER
            where: role IS NULL

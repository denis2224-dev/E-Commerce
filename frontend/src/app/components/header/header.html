<header class="site-header">
  <a class="brand" routerLink="/" aria-label="Game Store home">
    <span class="brand-mark">G</span>
    <span class="brand-text">{{ brandName }}</span>
  </a>

  <nav class="nav-links" aria-label="Primary navigation">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="actions">
    <button class="icon-button" type="button" aria-label="Search games">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path
          d="M10.75 5.5a5.25 5.25 0 1 0 0 10.5 5.25 5.25 0 0 0 0-10.5ZM4 10.75a6.75 6.75 0 1 1 12.08 4.16l3.25 3.26-1.06 1.06-3.26-3.25A6.75 6.75 0 0 1 4 10.75Z"
        />
      </svg>
    </button>
    @if (isLoggedIn()) {
      <button class="sign-in-button secondary" type="button" (click)="logout()">Logout</button>
    } @else {
      <button class="sign-in-button" type="button" routerLink="/sign-in">Sign in</button>
    }
  </div>
</header>

name: game-store

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: game-store-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - game-store-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game-store-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - game-store-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: game-store-postgres
    environment:
      POSTGRES_DB: game_store
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
    ports:
      - "55433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - game-store-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: game-store-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - game-store-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  game-store-network:
    driver: bridge
